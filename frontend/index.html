<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Responsive viewport: makes the layout work on mobile screens -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip Planner — AI Travel Assistant</title>
    <!--
      WHY THIS FILE:
      Vite uses this as the HTML shell. React mounts into the <div id="root">.
      The <script> tag imports App.jsx — Vite compiles the entire React app
      starting from that entry point. In production, Vite replaces this
      script tag with bundled JS files.
    -->
  </head>
  <body>
    <!-- React mounts here. App.jsx controls everything inside this div. -->
    <div id="root"></div>

    <!--
      type="module": tells the browser this is an ES module.
      Vite intercepts this request and serves the compiled React app.
      In production (after npm run build), this becomes a bundled .js file.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
